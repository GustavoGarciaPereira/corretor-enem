{% extends "base.html" %}

{% block title %}Editar Competência — Correção de Redação{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Editar Competência</h2>

        <div class="card shadow">
            <div class="card-body">
                <form method="post" action="/competences/{{ comp.id }}/edit">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="name" name="name"
                               value="{{ comp.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Descrição</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3" required>{{ comp.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="max_score" class="form-label">Valor Máximo</label>
                        <input type="number" class="form-control" id="max_score" name="max_score"
                               value="{{ comp.max_score }}" min="1" max="1000">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/competences" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
